<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Universal Invoice Manager</title>
<meta name="theme-color" content="#0B7A5C">
<meta name="description" content="Aplikasi manajemen invoice: dashboard, invoice, klien, invoice berulang, laporan pajak, dan pengingat WhatsApp/Email.">
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Invoice Manager">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<script src="config.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bg:#F4F6F4; --surface:#FFFFFF; --ink:#16241E; --muted:#64716B;
  --accent:#0B7A5C; --accent-deep:#08573F; --accent-soft:#E4F3ED;
  --amber:#B45309; --amber-soft:#FCF0E1; --red:#B91C1C; --red-soft:#FCE8E8;
  --slate:#556066; --slate-soft:#ECEFF0; --line:#E2E8E3;
  --radius:14px; --shadow:0 1px 3px rgba(22,36,30,.07),0 6px 18px rgba(22,36,30,.05);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:inherit;font-size:14px;color:var(--ink)}
.num{font-variant-numeric:tabular-nums}
.hidden{display:none!important}

/* ---------- LOGIN ---------- */
#loginView{min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:20px;
  background:linear-gradient(160deg,#0B7A5C 0%,#08573F 55%,#053B2B 100%)}
.login-card{background:var(--surface);border-radius:20px;padding:34px 28px;width:100%;max-width:390px;box-shadow:0 20px 60px rgba(0,0,0,.28)}
.login-mono{width:56px;height:56px;border-radius:16px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:22px;margin:0 auto 16px;letter-spacing:-.5px;overflow:hidden}
.login-mono img,.sb-mono img{width:100%;height:100%;object-fit:cover}
.login-card h1{font-size:21px;font-weight:800;text-align:center;letter-spacing:-.3px}
.login-card .sub{text-align:center;color:var(--muted);font-size:13px;margin:6px 0 24px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.field input,.field select,.field textarea{width:100%;padding:11px 13px;border:1.5px solid var(--line);border-radius:10px;background:#FBFCFB;outline:none;transition:border-color .15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);background:#fff}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:11px 18px;border-radius:10px;font-weight:700;font-size:14px;transition:opacity .15s,transform .05s}
.btn:active{transform:scale(.98)}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-deep)}
.btn-ghost{background:var(--slate-soft);color:var(--ink)}
.btn-danger{background:var(--red-soft);color:var(--red)}
.btn-block{width:100%}
.btn-sm{padding:7px 12px;font-size:12.5px;border-radius:8px}
.login-err{background:var(--red-soft);color:var(--red);padding:10px 12px;border-radius:10px;font-size:13px;margin-bottom:14px;display:none}
.login-hint{margin-top:18px;text-align:center;font-size:12px;color:var(--muted)}

/* ---------- APP SHELL ---------- */
#appView{display:flex;min-height:100vh;min-height:100dvh}
.sidebar{display:none}
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:40;background:rgba(244,246,244,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);
  padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.topbar h2{font-size:17px;font-weight:800;letter-spacing:-.3px}
.avatar{width:34px;height:34px;border-radius:50%;background:var(--accent-soft);color:var(--accent-deep);font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center;border:1.5px solid var(--accent);overflow:hidden;flex:none}
.avatar img{width:100%;height:100%;object-fit:cover;display:block}
.avatar.clickable{cursor:pointer}
.avatar-lg{width:96px;height:96px;font-size:34px;border-width:2px}
/* Upload gambar */
.uploader{display:flex;align-items:center;gap:12px;margin:6px 0 4px}
.up-prev{width:64px;height:64px;border-radius:12px;border:1.5px solid var(--line);background:var(--bg);object-fit:contain;display:none}
.up-prev.show{display:block}
.up-avatar-prev{width:88px;height:88px;border-radius:50%;border:2px solid var(--accent);object-fit:cover;background:var(--accent-soft)}
.up-btns{display:flex;flex-direction:column;gap:6px}
/* Lightbox zoom */
.lightbox{position:fixed;inset:0;z-index:200;background:rgba(11,18,15,.92);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;touch-action:none}
.lightbox img{max-width:92vw;max-height:78vh;border-radius:14px;transition:transform .08s ease-out;transform-origin:center center;user-select:none;-webkit-user-drag:none}
.lb-bar{display:flex;gap:10px;align-items:center}
.lb-bar button{width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,.14);color:#fff;font-size:20px;font-weight:700;display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,.2)}
.lb-bar button:active{background:rgba(255,255,255,.28)}
.lb-close{position:absolute;top:calc(16px + env(safe-area-inset-top));right:18px;width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.14);color:#fff;font-size:22px;border:1px solid rgba(255,255,255,.2)}
.lb-hint{color:rgba(255,255,255,.75);font-size:12px}
.content{flex:1;padding:16px;padding-bottom:96px;max-width:1150px;width:100%;margin:0 auto}

/* Bottom nav (mobile) */
.bottomnav{position:fixed;bottom:0;left:0;right:0;z-index:50;background:var(--surface);border-top:1px solid var(--line);
  display:flex;align-items:stretch;justify-content:space-around;padding:6px 4px calc(6px + env(safe-area-inset-bottom))}
.bn-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 2px;color:var(--muted);font-size:10.5px;font-weight:700;border-radius:10px}
.bn-item svg{width:22px;height:22px}
.bn-item.active{color:var(--accent-deep)}
.bn-fab{width:52px;height:52px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 16px rgba(11,122,92,.4);margin-top:-24px;flex:none;align-self:center}
.bn-fab svg{width:26px;height:26px}

/* ---------- DESKTOP ---------- */
@media(min-width:1024px){
  .bottomnav{display:none}
  .content{padding:28px 32px 48px}
  .sidebar{display:flex;flex-direction:column;width:242px;flex:none;background:var(--surface);border-right:1px solid var(--line);
    position:sticky;top:0;height:100vh;padding:20px 14px}
  .sb-brand{display:flex;align-items:center;gap:10px;padding:6px 10px 20px}
  .sb-mono{width:38px;height:38px;border-radius:11px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;overflow:hidden}
  .sb-brand b{font-size:14.5px;letter-spacing:-.2px;line-height:1.2}
  .sb-nav{flex:1;display:flex;flex-direction:column;gap:2px;overflow-y:auto}
  .sb-item{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;font-weight:600;font-size:13.5px;color:var(--muted);width:100%;text-align:left}
  .sb-item svg{width:19px;height:19px;flex:none}
  .sb-item:hover{background:var(--bg)}
  .sb-item.active{background:var(--accent-soft);color:var(--accent-deep);font-weight:700}
  .sb-user{border-top:1px solid var(--line);padding-top:12px;display:flex;align-items:center;gap:10px}
  .sb-user .meta{flex:1;min-width:0}
  .sb-user .meta b{display:block;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sb-user .meta span{font-size:11px;color:var(--muted)}
}

/* ---------- COMPONENTS ---------- */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.card-p{padding:16px}
.grid-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}
@media(min-width:768px){.grid-stats{grid-template-columns:repeat(4,1fr)}}
.stat{padding:14px 15px}
.stat .lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
.stat .val{font-size:19px;font-weight:800;margin-top:4px;letter-spacing:-.4px}
@media(min-width:768px){.stat .val{font-size:22px}}
.stat .sub{font-size:11.5px;color:var(--muted);margin-top:2px}
.section-title{font-size:15px;font-weight:800;margin:20px 0 10px;letter-spacing:-.2px;display:flex;align-items:center;justify-content:space-between}
.pill{display:inline-flex;align-items:center;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:800;letter-spacing:.02em}
.pill.paid{background:var(--accent-soft);color:var(--accent-deep)}
.pill.unpaid{background:var(--amber-soft);color:var(--amber)}
.pill.overdue{background:var(--red-soft);color:var(--red)}
.pill.draft{background:var(--slate-soft);color:var(--slate)}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.toolbar input,.toolbar select{padding:9px 12px;border:1.5px solid var(--line);border-radius:10px;background:var(--surface);outline:none}
.toolbar input{flex:1;min-width:150px}
.list-item{display:flex;align-items:center;gap:12px;padding:13px 15px;border-bottom:1px solid var(--line)}
.list-item:last-child{border-bottom:none}
.li-main{flex:1;min-width:0}
.li-main .t1{font-weight:700;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.li-main .t2{font-size:12px;color:var(--muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.li-amt{text-align:right;flex:none}
.li-amt .a1{font-weight:800;font-size:13.5px;letter-spacing:-.2px}
.li-amt .a2{font-size:11px;color:var(--muted);margin-top:2px}
.invnum{font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:.01em}
.empty{padding:40px 20px;text-align:center;color:var(--muted)}
.empty b{display:block;color:var(--ink);font-size:15px;margin-bottom:4px}
.chip-row{display:flex;gap:6px;flex-wrap:wrap}
.chip{padding:6px 12px;border-radius:99px;border:1.5px solid var(--line);background:var(--surface);font-size:12px;font-weight:700;color:var(--muted)}
.chip.active{background:var(--ink);color:#fff;border-color:var(--ink)}
.row-actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.iconbtn{width:34px;height:34px;border-radius:9px;background:var(--slate-soft);display:flex;align-items:center;justify-content:center;color:var(--slate);flex:none}
.iconbtn svg{width:17px;height:17px}
.iconbtn.green{background:var(--accent-soft);color:var(--accent-deep)}
.iconbtn.red{background:var(--red-soft);color:var(--red)}
table.dt{width:100%;border-collapse:collapse}
table.dt th{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);text-align:left;padding:10px 12px;border-bottom:1px solid var(--line)}
table.dt td{padding:11px 12px;border-bottom:1px solid var(--line);font-size:13px;vertical-align:top}
table.dt tr:last-child td{border-bottom:none}
.grid-2{display:grid;grid-template-columns:1fr;gap:12px}
@media(min-width:768px){.grid-2{grid-template-columns:1fr 1fr}}
.grid-3{display:grid;grid-template-columns:1fr;gap:12px}
@media(min-width:768px){.grid-3{grid-template-columns:repeat(3,1fr)}}

/* Modal / sheet */
.modal-bg{position:fixed;inset:0;z-index:100;background:rgba(12,20,17,.5);display:flex;align-items:flex-end;justify-content:center}
@media(min-width:768px){.modal-bg{align-items:center;padding:24px}}
.modal{background:var(--surface);width:100%;max-height:92dvh;overflow-y:auto;border-radius:20px 20px 0 0;padding:20px 18px calc(20px + env(safe-area-inset-bottom))}
@media(min-width:768px){.modal{max-width:640px;border-radius:18px;padding:24px}}
.modal.narrow{max-width:420px}
.modal h3{font-size:17px;font-weight:800;margin-bottom:16px;letter-spacing:-.3px}
.modal-actions{display:flex;gap:8px;margin-top:18px}
.modal-actions .btn{flex:1}
.sheet-item{display:flex;align-items:center;gap:12px;padding:13px 10px;border-radius:12px;width:100%;text-align:left;font-weight:700;font-size:14px;color:var(--ink)}
.sheet-item svg{width:20px;height:20px;color:var(--muted)}
.sheet-item:active{background:var(--bg)}

/* Toast */
#toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%);z-index:200;background:var(--ink);color:#fff;
  padding:11px 18px;border-radius:12px;font-size:13px;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.25);opacity:0;transition:opacity .25s;pointer-events:none;max-width:90vw;text-align:center}
#toast.show{opacity:1}
@media(min-width:1024px){#toast{bottom:32px}}

/* Loader */
#loader{position:fixed;inset:0;z-index:300;background:rgba(244,246,244,.7);backdrop-filter:blur(2px);display:flex;align-items:center;justify-content:center}
.spinner{width:38px;height:38px;border:4px solid var(--accent-soft);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Items editor */
.item-row{display:grid;grid-template-columns:1fr 62px 100px 30px;gap:6px;margin-bottom:6px;align-items:center}
@media(min-width:768px){.item-row{grid-template-columns:1fr 80px 140px 120px 30px}}
.item-row input{padding:9px 10px;border:1.5px solid var(--line);border-radius:9px;background:#FBFCFB;outline:none;width:100%}
.item-row input:focus{border-color:var(--accent)}
.item-total{display:none;font-weight:700;font-size:13px;text-align:right}
@media(min-width:768px){.item-total{display:block}}
.summary-box{background:var(--bg);border-radius:12px;padding:14px;margin-top:14px}
.sum-row{display:flex;justify-content:space-between;font-size:13px;padding:3px 0}
.sum-row.total{font-size:16px;font-weight:800;border-top:1.5px solid var(--line);margin-top:6px;padding-top:9px}
.check-row{display:flex;align-items:center;gap:9px;padding:8px 0;font-size:13.5px}
.check-row input[type=checkbox]{width:17px;height:17px;accent-color:var(--accent)}

/* ---------- PRINT ---------- */
#printModal .modal{max-width:860px}
.print-sheet{background:#fff;border:1px solid var(--line);padding:34px;margin-top:12px;font-size:12.5px;overflow-x:auto}
.print-sheet .inv-head{display:flex;justify-content:space-between;gap:18px;flex-wrap:wrap;margin-bottom:26px}
.print-sheet .inv-title{font-size:26px;font-weight:800;letter-spacing:-.5px}
.print-sheet img.logo{max-height:56px;max-width:170px;object-fit:contain}
.print-sheet table{width:100%;border-collapse:collapse;margin:16px 0}
.print-sheet th{text-align:left;padding:8px 10px;font-size:11px;text-transform:uppercase;letter-spacing:.05em}
.print-sheet td{padding:8px 10px;border-bottom:1px solid #E5E7EB}
.print-sheet .tr{text-align:right}
.print-sheet .totals{margin-left:auto;max-width:280px}
.print-sheet .totals .sum-row{padding:4px 0}
.print-meta{color:#555;line-height:1.6}
/* Template: professional */
.tpl-professional .inv-band{background:var(--accent);color:#fff;margin:-34px -34px 24px;padding:26px 34px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.tpl-professional .inv-band .inv-title{color:#fff}
.tpl-professional th{background:var(--accent-soft);color:var(--accent-deep)}
/* Template: modern */
.tpl-modern{border-left:8px solid var(--ink)}
.tpl-modern .inv-title{text-transform:uppercase;letter-spacing:.12em;font-size:20px}
.tpl-modern th{border-bottom:2.5px solid var(--ink);color:var(--ink)}
/* Template: classic */
.tpl-classic{font-family:Georgia,'Times New Roman',serif;border:2.5px double #333}
.tpl-classic .inv-title{font-style:italic}
.tpl-classic th{border-top:1.5px solid #333;border-bottom:1.5px solid #333;color:#333}
/* Template: elegant */
.tpl-elegant .inv-title{font-weight:400;letter-spacing:.35em;text-transform:uppercase;font-size:19px}
.tpl-elegant th{color:#999;font-weight:600}
.tpl-elegant td{border-bottom:1px solid #F0F0F0}

/* Signature pad */
.sigpad-wrap{border:1.5px dashed var(--line);border-radius:12px;background:#fff;position:relative;overflow:hidden}
.sigpad-wrap.has-ink{border-style:solid;border-color:var(--accent)}
.sigpad{display:block;width:100%;height:150px;touch-action:none;cursor:crosshair;background:
  linear-gradient(#fff,#fff) padding-box}
.sigpad-hint{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:13px;pointer-events:none}
.sigpad-hint.hidden{display:none}
.sig-toolbar{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.sig-preview{max-height:80px;max-width:200px;object-fit:contain;border:1px solid var(--line);border-radius:8px;background:#fff;padding:4px}
/* Cap / stempel di editor */
.cap-row{display:flex;gap:10px;align-items:center;margin-top:6px}
.cap-prev{width:68px;height:68px;border-radius:10px;border:1px solid var(--line);object-fit:contain;background:#fff;flex:none}
.cap-prev.empty{display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--muted);text-align:center;border-style:dashed}

/* Berita Acara — template cetak modern */
.ba-sheet{color:#1a2620;font-size:13px;line-height:1.75}
.ba-head{display:flex;align-items:center;gap:16px;border-bottom:3px solid var(--accent);padding-bottom:16px;margin-bottom:6px}
.ba-head img{max-height:60px;max-width:150px;object-fit:contain}
.ba-head .ba-co{font-size:17px;font-weight:800;color:var(--accent-deep);letter-spacing:-.2px}
.ba-head .ba-co-sub{font-size:11.5px;color:#667;line-height:1.4}
.ba-title{text-align:center;margin:22px 0 2px}
.ba-title h2{font-size:18px;font-weight:800;letter-spacing:.03em;text-transform:uppercase}
.ba-title .ba-nomor{font-size:12.5px;color:#556;margin-top:2px}
.ba-body p{margin:12px 0}
.ba-party{margin:6px 0 6px 26px}
.ba-party table td{padding:1px 0;border:none;vertical-align:top}
.ba-party td:first-child{width:96px;color:#556}
.ba-party td.sep{width:12px}
.ba-tag{font-weight:700;color:var(--accent-deep)}
.ba-sheet table.ba-items{width:100%;border-collapse:collapse;margin:14px 0}
.ba-sheet table.ba-items th{background:var(--accent);color:#fff;padding:9px 10px;font-size:11.5px;text-transform:uppercase;letter-spacing:.04em;border:1px solid var(--accent)}
.ba-sheet table.ba-items td{padding:8px 10px;border:1px solid #dfe6e2}
.ba-sign{display:flex;justify-content:space-between;gap:24px;margin-top:34px;flex-wrap:wrap}
.ba-sign .ba-col{flex:1;min-width:200px;text-align:center}
.ba-sign .ba-role{font-weight:700;margin-bottom:6px}
.ba-sign .ba-ttd{position:relative;height:104px;display:flex;align-items:center;justify-content:center}
.ba-sign .ba-ttd-img{max-height:96px;max-width:180px;object-fit:contain;position:relative;z-index:2}
.ba-sign .ba-cap{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%) rotate(-13deg);max-height:118px;max-width:170px;object-fit:contain;opacity:.82;mix-blend-mode:multiply;z-index:1;pointer-events:none}
.ba-sign .ba-name{font-weight:800;border-top:1px solid #334;display:inline-block;padding-top:4px;min-width:170px;margin-top:2px}
.ba-sign .ba-job{font-size:11.5px;color:#556}

@media print{
  body *{visibility:hidden}
  #printArea,#printArea *{visibility:visible}
  #printArea{position:absolute;left:0;top:0;width:100%}
  #printArea,#printArea *{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  #printArea img{display:inline-block!important}
  .ba-sign .ba-cap{mix-blend-mode:multiply;opacity:.85}
  .print-sheet{border:none;padding:10mm}
}
</style>
</head>
<body>

<!-- ==================== LOGIN ==================== -->
<div id="loginView">
  <div class="login-card">
    <div class="login-mono" id="loginMono">IM</div>
    <h1 id="loginTitle">Universal Invoice Manager</h1>
    <p class="sub">Masuk untuk mengelola invoice bisnis Anda</p>

var CURRENCIES = [

function $(id){ return document.getElementById(id); }
function esc(s){ return String(s===undefined||s===null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtMoney(amount, currency){
  currency = currency || 'IDR';
  var n = Number(amount)||0;
  if (currency === 'IDR') return 'Rp ' + n.toLocaleString('id-ID', {maximumFractionDigits:0});
  var c = CURRENCIES.find(function(x){return x.code===currency;});
  return (c?c.symbol:currency+' ') + n.toLocaleString('en-US', {maximumFractionDigits:2});
}
function fmtDate(d){
  if(!d) return '—';
  var parts = String(d).split('T')[0].split('-');
  if(parts.length!==3) return String(d);
  var bulan = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
  return parseInt(parts[2],10)+' '+bulan[parseInt(parts[1],10)-1]+' '+parts[0];
}
function todayStr(){
  var d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function toast(msg){
  var t = $('toast'); t.textContent = msg; t.classList.add('show');

/* ---- Branding aplikasi (judul & logo) ---- */
function brandInitials(name){
  var parts = String(name||'IM').trim().split(/\s+/).filter(Boolean);
  if(!parts.length) return 'IM';
  if(parts.length===1) return parts[0].substring(0,2).toUpperCase();
  return (parts[0].charAt(0)+parts[1].charAt(0)).toUpperCase();
}
function brandBadge(name, logo){
  if(!logo) return esc(brandInitials(name));
  return '<img src="'+esc(logo)+'" alt="logo" onerror="this.parentNode.textContent=\''+esc(brandInitials(name))+'\'">';

function pmLineText(m){
  if(!m) return '';
  if(m.type==='bank'){ return [m.label||'Bank', m.accountNumber, m.accountName?('a.n. '+m.accountName):''].filter(Boolean).join(' '); }

/* ---- Kompresi gambar → dataURL (untuk foto profil & logo) ---- */
function compressImage(file, maxDim, quality){
  return new Promise(function(resolve, reject){
    if(!file){ reject(new Error('Tidak ada file.')); return; }
    if(file.size > 12*1024*1024){ reject(new Error('Ukuran file maksimal 12 MB.')); return; }
    var reader = new FileReader();
    reader.onload = function(e){
      var img = new Image();
      img.onload = function(){
        var w = img.width, h = img.height;
        var scale = Math.min(1, maxDim/Math.max(w,h));
        w = Math.round(w*scale); h = Math.round(h*scale);
        function encode(cw, ch){
          var cv = document.createElement('canvas'); cv.width = cw; cv.height = ch;
          var ctx = cv.getContext('2d');
          ctx.fillStyle = '#ffffff'; ctx.fillRect(0,0,cw,ch);
          ctx.drawImage(img, 0, 0, cw, ch);
          var q = quality || 0.75;
          var out = cv.toDataURL('image/jpeg', q);
          while(out.length > 46000 && q > 0.35){ q -= 0.1; out = cv.toDataURL('image/jpeg', q); }
          return out;
        }
        var out = encode(w, h);
        // Bila masih terlalu besar, kecilkan dimensi bertahap hingga muat
        var guard = 0;
        while(out.length > 46000 && Math.max(w,h) > 90 && guard < 8){
          w = Math.round(w*0.8); h = Math.round(h*0.8);
          out = encode(w, h); guard++;
        }
        resolve(out);
      };
      img.onerror = function(){ reject(new Error('File bukan gambar yang valid.')); };
      img.src = e.target.result;
    };
    reader.onerror = function(){ reject(new Error('Gagal membaca file.')); };
    reader.readAsDataURL(file);
  });
}

/* ---- Lightbox zoom untuk foto profil ---- */
var _zoom = { scale:1, x:0, y:0, sx:0, sy:0, drag:false, pinchDist:0 };
function openZoom(src){
  if(!src){ toast('Belum ada foto.'); return; }
  var old = $('lightbox'); if(old) old.remove();
  _zoom = { scale:1, x:0, y:0, sx:0, sy:0, drag:false, pinchDist:0 };
  var lb = document.createElement('div');
  lb.id = 'lightbox'; lb.className = 'lightbox';
  lb.innerHTML =
    '<button class="lb-close" onclick="closeZoom()">✕</button>' +
    '<img id="zoomImg" src="'+esc(src)+'" alt="foto profil">' +
    '<div class="lb-bar">' +
      '<button onclick="zoomBy(-0.3)">−</button>' +
      '<button onclick="zoomReset()">⟳</button>' +
      '<button onclick="zoomBy(0.3)">+</button>' +
    '</div><div class="lb-hint">Cubit / scroll untuk zoom, seret untuk geser</div>';
  document.body.appendChild(lb);
  var img = $('zoomImg');
  lb.addEventListener('wheel', function(ev){ ev.preventDefault(); zoomBy(ev.deltaY < 0 ? 0.18 : -0.18); }, {passive:false});
  lb.addEventListener('click', function(ev){ if(ev.target === lb) closeZoom(); });
  // Sentuh: pinch + drag
  img.addEventListener('touchstart', function(ev){
    if(ev.touches.length === 2){ _zoom.pinchDist = _touchDist(ev); }
    else if(ev.touches.length === 1){ _zoom.drag = true; _zoom.sx = ev.touches[0].clientX - _zoom.x; _zoom.sy = ev.touches[0].clientY - _zoom.y; }
  }, {passive:false});
  img.addEventListener('touchmove', function(ev){
    ev.preventDefault();
    if(ev.touches.length === 2){
      var d = _touchDist(ev);
      if(_zoom.pinchDist){ zoomBy((d - _zoom.pinchDist)/180); }
      _zoom.pinchDist = d;
    } else if(ev.touches.length === 1 && _zoom.drag && _zoom.scale > 1){
      _zoom.x = ev.touches[0].clientX - _zoom.sx; _zoom.y = ev.touches[0].clientY - _zoom.sy; _applyZoom();
    }
  }, {passive:false});
  img.addEventListener('touchend', function(){ _zoom.drag = false; _zoom.pinchDist = 0; });
  // Mouse drag desktop
  img.addEventListener('mousedown', function(ev){ _zoom.drag = true; _zoom.sx = ev.clientX - _zoom.x; _zoom.sy = ev.clientY - _zoom.y; });
  window.addEventListener('mousemove', _zoomMouseMove);
  window.addEventListener('mouseup', function(){ _zoom.drag = false; });
}
function _touchDist(ev){ var a=ev.touches[0], b=ev.touches[1]; return Math.hypot(a.clientX-b.clientX, a.clientY-b.clientY); }
function _zoomMouseMove(ev){ if(_zoom.drag && _zoom.scale>1){ _zoom.x = ev.clientX - _zoom.sx; _zoom.y = ev.clientY - _zoom.sy; _applyZoom(); } }
function zoomBy(delta){ _zoom.scale = Math.min(5, Math.max(1, _zoom.scale + delta)); if(_zoom.scale===1){ _zoom.x=0; _zoom.y=0; } _applyZoom(); }
function zoomReset(){ _zoom.scale=1; _zoom.x=0; _zoom.y=0; _applyZoom(); }
function _applyZoom(){ var img=$('zoomImg'); if(img) img.style.transform = 'translate('+_zoom.x+'px,'+_zoom.y+'px) scale('+_zoom.scale+')'; }
function closeZoom(){ window.removeEventListener('mousemove', _zoomMouseMove); var lb=$('lightbox'); if(lb) lb.remove(); }

/* ============================================================
   LAPISAN SERVER (DUAL-MODE)
   - Di dalam GAS Web App: pakai google.script.run
   - Di GitHub Pages (statis): pakai fetch ke GAS_URL (config.js)
============================================================ */
var GAS_URL = (window.APP_CONFIG && window.APP_CONFIG.GAS_URL) || 'https://script.google.com/macros/s/AKfycbyp9FKVL5AN1fz06F_BR8qFBEgClXZHHJjfRBp_UXm0R05FLO0Y8zBUuOnl_ikewl8K/exec';
var IS_GAS = (typeof google !== 'undefined' && google.script && google.script.run);

function callServer(fnName, args){
  return new Promise(function(resolve, reject){
    if (IS_GAS){
      var runner = google.script.run
        .withSuccessHandler(resolve)
        .withFailureHandler(function(err){ reject(new Error(err && err.message ? err.message : 'Gagal terhubung ke server.')); });
      runner[fnName].apply(runner, args);
      return;
    }
    if (!GAS_URL){ reject(new Error('URL Web App belum diatur. Edit config.js dan isi GAS_URL.')); return; }
    var payload;
    if (fnName === 'login') payload = { action:'login', username:args[0], password:args[1] };
    else if (fnName === 'logout') payload = { action:'logout', token:args[0] };
    else if (fnName === 'api') payload = { action:args[1], token:args[0], payload:args[2] };
    else { reject(new Error('Fungsi tidak dikenal: '+fnName)); return; }
    fetch(GAS_URL, {
      method:'POST',
      headers:{ 'Content-Type':'text/plain;charset=utf-8' }, // hindari CORS preflight
      body: JSON.stringify(payload),
      redirect:'follow'
    })
    .then(function(r){ return r.text(); })
    .then(function(text){ resolve(text); })
    .catch(function(e){ reject(new Error('Gagal terhubung ke server. Periksa koneksi & GAS_URL. ('+e.message+')')); });
  });
}

/* Pembungkus API — mengembalikan data hasil, menangani sesi kedaluwarsa */
function api(action, payload){
  return callServer('api', [state.token, action, payload || {}]).then(function(raw){
    var res;
    try { res = (typeof raw === 'string') ? JSON.parse(raw) : raw; }
    catch(e){ throw new Error('Respons server tidak valid.'); }
    if (res.success) return res.data;
    if (String(res.error).indexOf('AUTH') === 0) forceLogout();
    throw new Error(res.error);
  });
}

/* ============================================================
   AUTH
============================================================ */
function doLogin(){
  var u = $('loginUser').value.trim(), p = $('loginPass').value;
  if(!u || !p){ showLoginErr('Isi username dan password.'); return; }
  $('btnLogin').disabled = true; $('btnLogin').textContent = 'Memeriksa...';
  callServer('login', [u, p]).then(function(raw){
    $('btnLogin').disabled = false; $('btnLogin').textContent = 'Masuk';
    var res;
    try { res = (typeof raw === 'string') ? JSON.parse(raw) : raw; }
    catch(e){ showLoginErr('Respons server tidak valid.'); return; }
    if(!res.success){ showLoginErr(res.error); return; }
    state.token = res.token; state.user = res.user;
    try { localStorage.setItem('uim_session', JSON.stringify({token:res.token, user:res.user})); } catch(e){}
    enterApp();
  }).catch(function(err){
    $('btnLogin').disabled = false; $('btnLogin').textContent = 'Masuk';
    showLoginErr('Gagal terhubung: ' + err.message);
  });
}
function showLoginErr(msg){ var e=$('loginErr'); e.textContent=msg; e.style.display='block'; }
function doLogout(){
  if(state.token){ try{ callServer('logout', [state.token]).catch(function(){}); }catch(e){} }
  forceLogout();
}
function forceLogout(){
  state.token = null; state.user = null;
  try { localStorage.removeItem('uim_session'); } catch(e){}
  closeModal();
  $('appView').classList.add('hidden');
  $('loginView').classList.remove('hidden');
  loading(false);
}
function enterApp(){
  $('loginView').classList.add('hidden');
  $('appView').classList.remove('hidden');
  refreshAvatars();
  buildSidebar();
  reloadData(false).then(function(){ go('dashboard'); });
}
function refreshAvatars(){
  var u = state.user || {};
  var inner = avatarInner(u.photo, u.name || u.username);
  var tb = $('tbAvatar'), sb = $('sbAvatar');
  if(tb){ tb.innerHTML = inner; tb.classList.add('clickable'); }
  if(sb){ sb.innerHTML = inner; sb.classList.add('clickable'); sb.onclick = function(){ u.photo ? openZoom(u.photo) : openProfile(); }; }
  $('sbName').textContent = u.name || u.username;
  $('sbRole').textContent = u.role === 'admin' ? 'Administrator' : 'Staf';
}

/* ============================================================
   DATA
============================================================ */
function reloadData(notify){
  loading(true);
  return api('getInitialData').then(function(data){
    state.db = data;
    applyBranding(data.settings.appName, data.settings.appLogoUrl);
    loading(false);
    if(notify) toast('Data diperbarui');
    render();
  }).catch(function(err){
    loading(false);
    toast('Gagal memuat: ' + err.message);
  });
}

function openBackup(){
  openModal('<div class="modal narrow"><h3>Backup & Pemulihan Data</h3>' +
    '<p style="font-size:12.5px;color:var(--muted);margin-bottom:12px">Simpan salinan seluruh data (invoice, klien, user, pengaturan). Simpan file backup di tempat aman.</p>' +
    '<button class="btn btn-primary btn-block" onclick="downloadBackup()"><span>⬇︎ Unduh Backup (.json)</span></button>' +
    '<button class="btn btn-ghost btn-block" style="margin-top:8px" onclick="driveBackup()">☁︎ Backup ke Google Drive</button>' +
    '<div class="section-title" style="margin-top:16px">Pulihkan Data</div>' +
    '<p style="font-size:12px;color:var(--red);margin-bottom:8px">⚠ Memulihkan akan <b>menimpa</b> seluruh data saat ini. Unduh backup dulu sebelum melanjutkan.</p>' +
    '<label class="btn btn-danger btn-block" style="cursor:pointer">Pilih File Backup untuk Dipulihkan<input type="file" accept="application/json,.json" style="display:none" onchange="onRestoreFile(this)"></label>' +
    '<div class="modal-actions" style="margin-top:14px"><button class="btn btn-ghost" onclick="closeModal()">Tutup</button></div></div>');
}
function downloadBackup(){
  loading(true);
  api('exportBackup').then(function(r){
    var blob = new Blob([r.json], { type:'application/json' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a'); a.href = url; a.download = r.filename;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(function(){ URL.revokeObjectURL(url); }, 1500);
    loading(false); toast('Backup diunduh ✓');
  }).catch(function(e){ loading(false); toast(e.message); });
}
function driveBackup(){
  loading(true);
  api('backupToDrive').then(function(r){
    loading(false);
    openModal('<div class="modal narrow"><h3>Backup Tersimpan ✓</h3>' +
      '<p style="font-size:13px;margin-bottom:6px">File <b>'+esc(r.fileName)+'</b> disimpan di folder Drive <b>'+esc(r.folderName)+'</b>.</p>' +
      '<a class="btn btn-primary btn-block" href="'+esc(r.fileUrl)+'" target="_blank">Buka File di Drive</a>' +
      '<div class="modal-actions" style="margin-top:12px"><button class="btn btn-ghost" onclick="closeModal()">Tutup</button></div></div>');
  }).catch(function(e){ loading(false); toast(e.message); });
}
function onRestoreFile(input){
  var file = input.files && input.files[0]; if(!file) return;
  var reader = new FileReader();
  reader.onload = function(e){
    var text = e.target.result;
    var meta;
    try { meta = JSON.parse(text).meta; } catch(err){ toast('File bukan JSON valid.'); return; }
    if(!confirm('Pulihkan data dari backup '+((meta&&meta.exportedAt)?('('+meta.exportedAt.split("T")[0]+')'):'')+'?\n\nSeluruh data saat ini akan DITIMPA. Lanjutkan?')) { input.value=''; return; }
    loading(true);
    api('restoreBackup', { json:text }).then(function(r){
      loading(false); closeModal();
      toast('Data dipulihkan ✓ ('+r.counts.invoices+' invoice, '+r.counts.clients+' klien)');
      reloadData(false);
    }).catch(function(err){ loading(false); toast(err.message); });
  };
  reader.onerror = function(){ toast('Gagal membaca file.'); };
  reader.readAsText(file);
}

============================================================ */
function viewDashboard(){
  var inv = state.db.invoices;
  var cur = state.db.settings.defaultCurrency || 'IDR';
  var paid = inv.filter(function(i){return i.status==='paid';});
  var unpaid = inv.filter(function(i){return i.status==='unpaid';});
  var overdue = inv.filter(function(i){return i.status==='overdue';});
  var sum = function(a){ return a.reduce(function(s,i){return s+(Number(i.total)||0);},0); };

  var recent = inv.slice().sort(function(a,b){ return String(b.issueDate).localeCompare(String(a.issueDate)); }).slice(0,6);

  return '' +
  '<div class="grid-stats">' +
    stat('Pendapatan (Lunas)', fmtMoney(sum(paid),cur), paid.length+' invoice') +
    stat('Belum Dibayar', fmtMoney(sum(unpaid),cur), unpaid.length+' invoice') +
    stat('Jatuh Tempo', fmtMoney(sum(overdue),cur), overdue.length+' invoice', 'var(--red)') +
    stat('Total Invoice', String(inv.length), state.db.clients.length+' klien') +
  '</div>' +
  '<div class="grid-2">' +
    '<div class="card card-p"><div class="section-title" style="margin-top:0">Pendapatan 6 Bulan Terakhir</div><div style="height:220px"><canvas id="chartRevenue"></canvas></div></div>' +
    '<div class="card card-p"><div class="section-title" style="margin-top:0">Kategori Pendapatan</div><div style="height:220px"><canvas id="chartCategory"></canvas></div></div>' +
  '</div>' +
  '<div class="section-title">Invoice Terbaru <button class="btn btn-ghost btn-sm" onclick="go(\'invoices\')">Lihat Semua</button></div>' +
  '<div class="card">' + (recent.length ? recent.map(invoiceListItem).join('') :
    '<div class="empty"><b>Belum ada invoice</b>Tekan tombol + untuk membuat invoice pertama Anda.</div>') + '</div>';
}
function stat(lbl, val, sub, color){
  return '<div class="card stat"><div class="lbl">'+lbl+'</div><div class="val num"'+(color?' style="color:'+color+'"':'')+'>'+val+'</div><div class="sub">'+sub+'</div></div>';
}
function afterDashboard(){
  if (typeof Chart === 'undefined') return;
  Object.keys(state.charts).forEach(function(k){ try{state.charts[k].destroy();}catch(e){} });
  state.charts = {};

  // Revenue 6 bulan
  var labels = [], keys = [];
  var now = new Date();
  for (var i=5;i>=0;i--){
    var d = new Date(now.getFullYear(), now.getMonth()-i, 1);
    keys.push(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'));
    labels.push(['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'][d.getMonth()]);
  }
  var paidData = keys.map(function(k){
    return state.db.invoices.filter(function(inv){
      return inv.status==='paid' && String(inv.paymentDate||inv.issueDate).indexOf(k)===0;
    }).reduce(function(s,inv){return s+Number(inv.total);},0);
  });
  var el1 = $('chartRevenue');
  if (el1) state.charts.rev = new Chart(el1, {
    type:'bar',
    data:{ labels:labels, datasets:[{ data:paidData, backgroundColor:'#0B7A5C', borderRadius:6, maxBarThickness:38 }]},
    options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}},
      scales:{ y:{ ticks:{ callback:function(v){ return v>=1e6 ? (v/1e6)+'jt' : v>=1e3 ? (v/1e3)+'rb' : v; } }, grid:{color:'#EDF1EE'} }, x:{grid:{display:false}} } }
  });

  // Kategori
  var catMap = {};
  state.db.invoices.forEach(function(inv){
    if(inv.status!=='paid') return;
    var c = inv.category || 'Lainnya';
    catMap[c] = (catMap[c]||0) + Number(inv.total);
  });
  var catLabels = Object.keys(catMap);
  var el2 = $('chartCategory');
  if (el2){
    if (!catLabels.length){
      el2.parentElement.innerHTML = '<div class="empty" style="padding:60px 10px">Belum ada data pendapatan lunas.</div>';
    } else {
      state.charts.cat = new Chart(el2, {
        type:'doughnut',
        data:{ labels:catLabels, datasets:[{ data:catLabels.map(function(k){return catMap[k];}),
          backgroundColor:['#0B7A5C','#B45309','#556066','#3B6E8F','#8F5A3B','#5C0B7A','#7A5C0B','#0B3D7A','#94A3A0'] }]},
        options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{ position:'right', labels:{ boxWidth:12, font:{size:11} } } } }
      });
    }
  }
}

function computeTotals(e){
  var subtotal = e.items.reduce(function(s,it){ return s + (Number(it.total)||0); },0);
  var taxRate = 0;
  (state.db.settings.taxRates||[]).forEach(function(t){
    if((e.appliedTaxes||[]).indexOf(t.id)!==-1) taxRate += Number(t.rate)||0;
  });
  var discountAmount = subtotal * (Number(e.discountRate)||0) / 100;
  var taxable = subtotal - discountAmount;
  var taxAmount = taxable * taxRate / 100;
  return { subtotal:subtotal, taxRate:taxRate, taxAmount:taxAmount, discountAmount:discountAmount, total: taxable + taxAmount };
}
function summaryHtml(t, cur){
  return '<div class="sum-row"><span>Subtotal</span><span class="num">'+fmtMoney(t.subtotal,cur)+'</span></div>' +
    '<div class="sum-row"><span>Diskon</span><span class="num">− '+fmtMoney(t.discountAmount,cur)+'</span></div>' +
    '<div class="sum-row"><span>Pajak ('+t.taxRate+'%)</span><span class="num">'+fmtMoney(t.taxAmount,cur)+'</span></div>' +
    '<div class="sum-row total"><span>Total</span><span class="num">'+fmtMoney(t.total,cur)+'</span></div>';
}
function refreshSummary(){
  var t = computeTotals(editorState);
  var el = $('edSummary');
  if(el) el.innerHTML = summaryHtml(t, editorState.currency);
}
function updItem(idx, key, val){
  var it = editorState.items[idx]; if(!it) return;
  if(key==='name') it.name = val;
  else it[key] = Number(val)||0;
  it.total = (Number(it.quantity)||0) * (Number(it.price)||0);
  var rows = document.querySelectorAll('#edItems .item-total');
  if(rows[idx]) rows[idx].textContent = fmtMoney(it.total, editorState.currency);
  refreshSummary();
}
function addItem(){
  syncEditorFields();
  editorState.items.push({ id:'it-'+Date.now(), name:'', quantity:1, price:0, total:0 });
  renderEditor();
}
function delItem(idx){
  syncEditorFields();
  editorState.items.splice(idx,1);
  if(!editorState.items.length) editorState.items.push({ id:'it-'+Date.now(), name:'', quantity:1, price:0, total:0 });
  renderEditor();
}
function updPhase(idx, key, val){
  var p = editorState.paymentPhases[idx]; if(!p) return;
  p[key] = key==='percentage' ? (Number(val)||0) : val;
}
function addPhase(){
  syncEditorFields();
  editorState.paymentPhases = editorState.paymentPhases||[];
  editorState.paymentPhases.push({ id:'ph-'+Date.now(), name:'', percentage:50, amount:0, dueDate:todayStr(), status:'unpaid' });
  renderEditor();
}
function delPhase(idx){
  syncEditorFields();
  editorState.paymentPhases.splice(idx,1);
  renderEditor();
}
function toggleTax(taxId, on){
  editorState.appliedTaxes = editorState.appliedTaxes||[];
  var i = editorState.appliedTaxes.indexOf(taxId);
  if(on && i===-1) editorState.appliedTaxes.push(taxId);
  if(!on && i!==-1) editorState.appliedTaxes.splice(i,1);
  refreshSummary();
}
function fillClient(id){
  if(!id) return;
  var c = state.db.clients.find(function(x){return String(x.id)===String(id);});
  if(!c) return;
  $('edCName').value = c.name||''; $('edCEmail').value = c.email||'';
  $('edCPhone').value = c.phone||''; $('edCAddr').value = c.address||'';
}
function syncEditorFields(){
  var e = editorState;
  if(!$('edNumber')) return;
  e.invoiceNumber = $('edNumber').value.trim();
  e.status = $('edStatus').value;
  e.issueDate = $('edIssue').value;
  e.dueDate = $('edDue').value;
  e.clientName = $('edCName').value.trim();
  e.clientEmail = $('edCEmail').value.trim();
  e.clientPhone = $('edCPhone').value.trim();
  e.clientAddress = $('edCAddr').value.trim();
  e.category = $('edCategory').value;
  e.templateId = $('edTemplate').value;
  e.discountRate = Number($('edDiscount').value)||0;

function saveInvoice(){
  syncEditorFields();
  var e = editorState;
  if(!e.invoiceNumber){ toast('Nomor invoice wajib diisi'); return; }
  if(!e.clientName){ toast('Nama klien wajib diisi'); return; }
  if(!e.items.some(function(it){return it.name && it.total>0;})){ toast('Isi minimal satu item dengan harga'); return; }
  e.items = e.items.filter(function(it){ return it.name; });
  var t = computeTotals(e);
  e.subtotal = t.subtotal; e.taxRate = t.taxRate; e.taxAmount = t.taxAmount;
  e.discountAmount = t.discountAmount; e.total = t.total;
  (e.paymentPhases||[]).forEach(function(p){ p.amount = t.total * (Number(p.percentage)||0) / 100; });
  loading(true);
  api('saveInvoice', e).then(function(){
    closeModal(); toast('Invoice tersimpan ✓');
    return reloadData(false);
  }).catch(function(err){ loading(false); toast(err.message); });
}

// Tunggu semua gambar (data URL tanda tangan/cap/logo) selesai di-decode sebelum cetak
function waitImagesThenPrint(after){
  var pa = $('printArea');
  var imgs = Array.prototype.slice.call(pa.querySelectorAll('img'));
  var printed = false;
  function fire(){ if(printed) return; printed = true; try{ window.print(); } finally { if(after) setTimeout(after, 500); } }
  if(!imgs.length){ setTimeout(fire, 60); return; }
  var proms = imgs.map(function(im){
    try { if(im.decode) return im.decode().catch(function(){}); } catch(e){}
    if(im.complete) return Promise.resolve();
    return new Promise(function(res){ im.addEventListener('load', res); im.addEventListener('error', res); });
  });
  Promise.all(proms).then(function(){ setTimeout(fire, 90); });
  setTimeout(fire, 3000); // jaring pengaman bila ada gambar yang macet
}

============================================================ */
var taxYear = new Date().getFullYear();
function viewTax(){
  var inv = state.db.invoices.filter(function(i){ return String(i.issueDate).indexOf(String(taxYear))===0 && i.status!=='draft'; });
  var cur = state.db.settings.defaultCurrency||'IDR';
  var bulan = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
  var rows = '';
  var totalCollected = 0, totalPotential = 0;
  for (var m=0;m<12;m++){
    var mk = String(taxYear)+'-'+String(m+1).padStart(2,'0');
    var mo = inv.filter(function(i){ return String(i.issueDate).indexOf(mk)===0; });
    var collected = mo.filter(function(i){return i.status==='paid';}).reduce(function(s,i){return s+Number(i.taxAmount||0);},0);
    var potential = mo.filter(function(i){return i.status!=='paid';}).reduce(function(s,i){return s+Number(i.taxAmount||0);},0);
    var omzet = mo.reduce(function(s,i){return s+Number(i.subtotal||0)-Number(i.discountAmount||0);},0);
    totalCollected += collected; totalPotential += potential;
    if (mo.length || collected || potential){
      rows += '<tr><td>'+bulan[m]+'</td><td class="num">'+mo.length+'</td><td class="num" style="text-align:right">'+fmtMoney(omzet,cur)+'</td>' +
        '<td class="num" style="text-align:right;color:var(--accent-deep);font-weight:700">'+fmtMoney(collected,cur)+'</td>' +
        '<td class="num" style="text-align:right;color:var(--amber)">'+fmtMoney(potential,cur)+'</td></tr>';
    }
  }
  var years = [];
  var y0 = new Date().getFullYear();
  for (var y=y0; y>=y0-4; y--) years.push('<option value="'+y+'"'+(taxYear===y?' selected':'')+'>'+y+'</option>');

  return '<div class="toolbar"><select onchange="taxYear=Number(this.value);render()">'+years.join('')+'</select></div>' +
    '<div class="grid-stats" style="grid-template-columns:repeat(2,1fr)">' +
      stat('Pajak Terkumpul (Lunas)', fmtMoney(totalCollected,cur), 'Tahun '+taxYear) +
      stat('Potensi Pajak (Belum Lunas)', fmtMoney(totalPotential,cur), 'Tahun '+taxYear, 'var(--amber)') +
    '</div>' +
    '<div class="card" style="overflow-x:auto"><table class="dt"><tr><th>Bulan</th><th>Invoice</th><th style="text-align:right">DPP (Omzet)</th><th style="text-align:right">Pajak Terkumpul</th><th style="text-align:right">Potensi Pajak</th></tr>' +
    (rows || '<tr><td colspan="5"><div class="empty">Belum ada data pajak untuk tahun '+taxYear+'.</div></td></tr>') +
    '</table></div>' +
    '<p style="font-size:12px;color:var(--muted);margin-top:12px">Perhitungan berdasarkan tarif pajak yang diterapkan pada tiap invoice. Konsultasikan dengan konsultan pajak untuk pelaporan resmi.</p>';
}

  { v:'serah-terima-barang', label:'Serah Terima Barang', judul:'BERITA ACARA SERAH TERIMA BARANG',
    pengantar:'PIHAK KESATU telah menyerahkan barang kepada PIHAK KEDUA, dan PIHAK KEDUA telah menerima barang tersebut dari PIHAK KESATU dengan rincian sebagai berikut:' },

];
function baJenis(v){ return BA_JENIS.find(function(x){return x.v===v;}) || BA_JENIS[0]; }

function _terbilang(n){
  n = Math.floor(Math.abs(n));
  var s = ['','satu','dua','tiga','empat','lima','enam','tujuh','delapan','sembilan','sepuluh','sebelas'];
  if(n < 12) return s[n];
  if(n < 20) return _terbilang(n-10)+' belas';
  if(n < 100) return _terbilang(Math.floor(n/10))+' puluh'+(n%10? ' '+_terbilang(n%10):'');
  if(n < 200) return 'seratus'+(n%100? ' '+_terbilang(n%100):'');
  if(n < 1000) return _terbilang(Math.floor(n/100))+' ratus'+(n%100? ' '+_terbilang(n%100):'');
  if(n < 2000) return 'seribu'+(n%1000? ' '+_terbilang(n%1000):'');
  if(n < 1000000) return _terbilang(Math.floor(n/1000))+' ribu'+(n%1000? ' '+_terbilang(n%1000):'');
  return String(n);
}
function titleWords(str){ return String(str).split(' ').map(function(w){ return w? w.charAt(0).toUpperCase()+w.slice(1):w; }).join(' '); }
function tanggalTerbilang(iso){
  var d = iso ? new Date(iso+'T00:00:00') : new Date();
  if(isNaN(d)) d = new Date();
  return { hari:HARI_ID[d.getDay()], tgl:titleWords(_terbilang(d.getDate())), bln:BULAN_ID[d.getMonth()], thn:titleWords(_terbilang(d.getFullYear())) };
}

/* ---- Signature pad ---- */
var _sigPads = {};
var _sigActive = null;
var _sigGlobalBound = false;
function _sigGlobalEnd(){ if(_sigActive){ var id=_sigActive.id; _sigActive.drawing=false; _sigActive=null; captureSig(id); } }
function initSigPad(canvasId, key){
  var cv = document.getElementById(canvasId); if(!cv) return;
  if(!_sigGlobalBound){ window.addEventListener('mouseup', _sigGlobalEnd); window.addEventListener('touchend', _sigGlobalEnd); _sigGlobalBound = true; }
  var wrap = cv.parentNode;
  var ratio = window.devicePixelRatio || 1;
  var w = cv.clientWidth || wrap.clientWidth || 300, h = 150;
  cv.width = Math.round(w*ratio); cv.height = Math.round(h*ratio);
  var ctx = cv.getContext('2d');
  ctx.scale(ratio, ratio);
  ctx.lineWidth = 2.2; ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.strokeStyle = '#12324a';
  var pad = { id:canvasId, cv:cv, ctx:ctx, drawing:false, empty:true, key:key, w:w, h:h };
  _sigPads[canvasId] = pad;
  if(baState[key]){ var img = new Image(); img.onload = function(){ ctx.drawImage(img,0,0,w,h); }; img.src = baState[key]; pad.empty = false; }
  function pos(e){ var r = cv.getBoundingClientRect(); var t = e.touches&&e.touches[0]?e.touches[0]:e; return { x:t.clientX-r.left, y:t.clientY-r.top }; }
  function start(e){ e.preventDefault(); pad.drawing = true; pad.empty = false; _sigActive = pad; wrap.classList.add('has-ink'); var hn=document.getElementById(canvasId+'-hint'); if(hn) hn.classList.add('hidden'); var p = pos(e); ctx.beginPath(); ctx.moveTo(p.x,p.y); }
  function move(e){ if(!pad.drawing) return; e.preventDefault(); var p = pos(e); ctx.lineTo(p.x,p.y); ctx.stroke(); }
  cv.addEventListener('mousedown', start); cv.addEventListener('mousemove', move);
  cv.addEventListener('touchstart', start, {passive:false}); cv.addEventListener('touchmove', move, {passive:false});
}
function captureSig(canvasId){
  var pad = _sigPads[canvasId]; if(!pad || pad.empty) return;
  var data = pad.cv.toDataURL('image/png');
  if(data.length > 40000){
    var tmp = document.createElement('canvas'); var scale = 300/pad.cv.width; tmp.width = 300; tmp.height = Math.round(pad.cv.height*scale);
    tmp.getContext('2d').drawImage(pad.cv, 0, 0, tmp.width, tmp.height);
    data = tmp.toDataURL('image/png');
  }
  baState[pad.key] = data;
}
function clearSig(canvasId){
  var pad = _sigPads[canvasId]; if(!pad) return;
  pad.ctx.clearRect(0,0,pad.cv.width,pad.cv.height); pad.empty = true;
  pad.cv.parentNode.classList.remove('has-ink');
  var hn = document.getElementById(canvasId+'-hint'); if(hn) hn.classList.remove('hidden');
  baState[pad.key] = '';
}
function uploadSig(input, key){
  var file = input.files && input.files[0]; if(!file) return;
  loading(true);
  compressImage(file, 320, 0.85).then(function(dataUrl){

}

/* ---- Prefill dari invoice ---- */
function baInvoiceToItems(inv){
  var items = (inv.items||[]).filter(function(it){ return it.name; }).map(function(it){
    return { nama: it.name||'', jumlah: (it.quantity!=null?String(it.quantity):''), satuan:'', keterangan: (it.total? fmtMoney(it.total, inv.currency):'') };
  });
  return items.length ? items : [{ nama:'', jumlah:'', satuan:'', keterangan:'' }];
}
function baApplyInvoice(inv){
  var s = state.db.settings||{};
  baState.invoiceId = inv.id;
  baState.invoiceNumber = inv.invoiceNumber||'';
  baState.pihak1 = { nama: baState.pihak1.nama||'', jabatan: baState.pihak1.jabatan||'', perusahaan: s.companyName||'' };
  baState.pihak2 = { nama: inv.clientName||'', jabatan: baState.pihak2.jabatan||'', perusahaan: inv.clientName||'' };
  baState.items = baInvoiceToItems(inv);
  if(!baState.tempat && inv.clientAddress){ /* biarkan tempat kosong; alamat klien tak selalu = tempat */ }
}
function baPickInvoice(id){
  if(!id){ baState.invoiceId=''; baState.invoiceNumber=''; renderBeritaEditor(); return; }
  var inv = (state.db.invoices||[]).find(function(x){ return String(x.id)===String(id); });
  if(!inv){ toast('Invoice tidak ditemukan.'); return; }
  var hasData = baState.pihak2.nama || baState.items.some(function(it){return it.nama;});
  if(hasData && !confirm('Isi otomatis pihak & rincian dari invoice '+ (inv.invoiceNumber||'') +'? Data yang ada akan ditimpa.')){
    baState.invoiceId = inv.id; baState.invoiceNumber = inv.invoiceNumber||''; renderBeritaEditor(); return;
  }
  baApplyInvoice(inv); renderBeritaEditor();
}
// Dipanggil dari detail invoice
function beritaFromInvoice(id){
  var inv = (state.db.invoices||[]).find(function(x){ return String(x.id)===String(id); });
  if(!inv){ toast('Invoice tidak ditemukan.'); return; }
  closeModal();
  baState = newBeritaState();

}

    '<div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">'+typeSel+
      '<button class="iconbtn red" style="width:30px;height:30px;margin-left:auto" onclick="removePaymentMethod('+idx+')">✕</button></div>' +
    fields + '</div>';
}
// Simpan nilai form yang belum tersimpan ke state agar tidak hilang saat render ulang
function syncSettingsForm(){
  var s = state.db.settings; if(!s) return;
  var g = function(id){ var e=$(id); return e?e.value:undefined; };
  var set = function(k,id){ var v=g(id); if(v!==undefined) s[k]=k==='appName'?(v.trim()||'Universal Invoice Manager'):v.trim(); };
  set('appName','stAppName'); set('companyName','stCompanyName'); set('companyEmail','stCompanyEmail');
  set('companyPhone','stCompanyPhone'); set('companyWebsite','stCompanyWebsite');
  var addr=$('stCompanyAddress'); if(addr) s.companyAddress=addr.value.trim();
  var cur=$('stDefaultCurrency'); if(cur) s.defaultCurrency=cur.value;
  var re=$('stReminderEmail'); if(re) s.reminderEmailTemplate=re.value;
  var rw=$('stReminderWa'); if(rw) s.reminderWhatsappTemplate=rw.value;
}
function addPaymentMethod(){
  syncSettingsForm();
  state.db.settings.paymentMethods = state.db.settings.paymentMethods||[];
  state.db.settings.paymentMethods.push({ id:'pm-'+Date.now(), type:'bank', label:'', accountNumber:'', accountName:'', note:'' });
  render();
}
function removePaymentMethod(idx){

}
function setPmType(idx,val){

}

function onStampUpload(input){

function saveSettings(){
  // Logo perusahaan: pakai unggahan baru bila ada; kalau tidak, pakai URL yang diketik;
  // kalau keduanya kosong, PERTAHANKAN logo tersimpan (agar tidak terhapus saat simpan ulang).
  var logoVal;
  if(_logoData !== null){ logoVal = _logoData; }
  else { var lu = $('stLogoUrl').value.trim(); logoVal = lu ? lu : (state.db.settings.logoUrl || ''); }
  var appLogoVal;
  if(typeof _appLogoData!=='undefined' && _appLogoData !== null){ appLogoVal = _appLogoData; }
  else { var au = $('stAppLogoUrl').value.trim(); appLogoVal = au ? au : (state.db.settings.appLogoUrl || ''); }
  var stampVal;
  if(typeof _stampData!=='undefined' && _stampData !== null){ stampVal = _stampData; }
  else { var su = ($('stStampUrl')&&$('stStampUrl').value.trim())||''; stampVal = su ? su : (state.db.settings.stampUrl || ''); }
  // bersihkan metode pembayaran kosong
  var methods = (state.db.settings.paymentMethods||[]).filter(function(m){
    return m && (m.label || m.accountNumber || m.accountName || m.note || m.type==='qris');
  });
  var p = {
    appName: ($('stAppName').value.trim() || 'Universal Invoice Manager'),
    appLogoUrl: appLogoVal,
    stampUrl: stampVal,
    companyName: $('stCompanyName').value.trim(),
    companyEmail: $('stCompanyEmail').value.trim(),
    companyPhone: $('stCompanyPhone').value.trim(),
    companyWebsite: $('stCompanyWebsite').value.trim(),
    logoUrl: logoVal,
    companyAddress: $('stCompanyAddress').value.trim(),
    defaultCurrency: $('stDefaultCurrency').value,
    paymentMethods: methods,
    taxRates: state.db.settings.taxRates || [],
    reminderEmailTemplate: $('stReminderEmail').value,
    reminderWhatsappTemplate: $('stReminderWa').value
  };
  loading(true);
  api('saveSettings', p).then(function(newS){
    state.db.settings = newS; _logoData = null; _appLogoData = null; _stampData = null;
    applyBranding(newS.appName, newS.appLogoUrl);
    loading(false); toast('Pengaturan tersimpan ✓'); render();
  }).catch(function(e){ loading(false); toast(e.message); });
}

============================================================ */
var usersCache = [];
function zoomUser(id){
  var u = usersCache.find(function(x){return String(x.id)===String(id);});
  if(u && u.photo) openZoom(u.photo); else toast('Belum ada foto.');
}
function viewUsers(){
  return '<div class="toolbar"><button class="btn btn-primary" onclick="openUserEditor()">+ User Baru</button></div>' +
    '<div class="card" id="usersList"><div class="empty">Memuat daftar user...</div></div>';
}

  api('listUsers').then(function(users){
    usersCache = users;
    var el = $('usersList'); if(!el) return;
    el.innerHTML = users.map(function(u){
      var wa = u.phone ? '<a class="iconbtn" title="Chat WhatsApp" href="https://wa.me/'+esc(u.phone)+'" target="_blank" onclick="event.stopPropagation()" style="color:#25D366"><svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M12 2a10 10 0 00-8.6 15l-1.3 4.7 4.8-1.3A10 10 0 1012 2zm0 18a8 8 0 01-4.1-1.1l-.3-.2-2.8.8.7-2.8-.2-.3A8 8 0 1112 20zm4.4-6c-.2-.1-1.4-.7-1.6-.8s-.4-.1-.5.1-.6.8-.8 1-.3.2-.5.1a6.6 6.6 0 01-1.9-1.2 7.3 7.3 0 01-1.4-1.7c-.1-.2 0-.4.1-.5l.4-.4.2-.4a.4.4 0 000-.4l-.8-1.8c-.2-.5-.4-.4-.5-.4h-.5a.9.9 0 00-.7.3 2.8 2.8 0 00-.9 2.1 4.9 4.9 0 001 2.6 11.2 11.2 0 004.3 3.8c.6.3 1.1.4 1.5.5a3.5 3.5 0 001.6.1 2.6 2.6 0 001.7-1.2 2.1 2.1 0 00.2-1.2c-.1-.1-.2-.2-.4-.3z"/></svg></a>' : '';
      var avatarClick = u.photo ? ' onclick="event.stopPropagation();zoomUser(\''+u.id+'\')"' : '';
      return '<div class="list-item" onclick="openUserEditor(\''+u.id+'\')" style="cursor:pointer">' +
        '<div class="avatar'+(u.photo?' clickable':'')+'" style="flex:none"'+avatarClick+'>'+avatarInner(u.photo, u.name||u.username)+'</div>' +
        '<div class="li-main"><div class="t1">'+esc(u.name)+' <span style="color:var(--muted);font-weight:500">@'+esc(u.username)+'</span></div>' +
        '<div class="t2">'+(u.phone?('📱 '+esc(u.phone)):esc(u.email||'—'))+'</div></div>' +
        '<div class="li-amt" style="display:flex;align-items:center;gap:6px">'+wa+'<span class="pill '+(u.role==='admin'?'paid':'draft')+'">'+(u.role==='admin'?'Admin':'Staf')+'</span>' +
        (u.isActive?'':'<div class="a2" style="color:var(--red)">Nonaktif</div>')+'</div></div>';
    }).join('') || '<div class="empty">Belum ada user.</div>';
  }).catch(function(e){ toast(e.message); });
}
var _userPhoto = null; // null = tak berubah; '' = hapus; dataURL = baru
function openUserEditor(id){
  var u = id ? usersCache.find(function(x){return String(x.id)===String(id);}) : null;
  u = u || { id:'', username:'', name:'', email:'', role:'staff', isActive:true, phone:'', photo:'' };
  _userPhoto = null; _lastUserId = id||'';
  openModal('<div class="modal narrow"><h3>'+(id?'Edit User':'User Baru')+'</h3>' +
    '<div style="display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:6px">' +
      '<div class="avatar avatar-lg'+(u.photo?' clickable':'')+'" id="usAvatar" onclick="_usZoom()">'+avatarInner(u.photo, u.name||u.username)+'</div>' +
      '<div class="up-btns" style="flex-direction:row">' +
        '<label class="btn btn-ghost btn-sm" style="cursor:pointer">Foto<input type="file" accept="image/*" style="display:none" onchange="onUserPhoto(this)"></label>' +
        '<button class="btn btn-ghost btn-sm" id="usRemoveBtn" style="'+(u.photo?'':'display:none')+'" onclick="removeUserPhoto()">Hapus</button>' +
      '</div></div>' +
    '<div class="field"><label>Username *</label><input id="usUsername" value="'+esc(u.username)+'"></div>' +
    '<div class="field"><label>Nama Lengkap</label><input id="usName" value="'+esc(u.name)+'"></div>' +
    '<div class="field"><label>Email</label><input id="usEmail" value="'+esc(u.email)+'"></div>' +
    '<div class="field"><label>No. HP / WhatsApp</label><input id="usPhone" inputmode="tel" placeholder="08xxxxxxxxxx" value="'+esc(u.phone||'')+'"></div>' +
    '<div class="field"><label>Password '+(id?'(kosongkan jika tidak diubah)':'*')+'</label><input id="usPassword" type="password" placeholder="Minimal 6 karakter"></div>' +
    '<div class="field"><label>Peran</label><select id="usRole">' +
      '<option value="staff"'+(u.role!=='admin'?' selected':'')+'>Staf</option>' +
      '<option value="admin"'+(u.role==='admin'?' selected':'')+'>Admin</option></select></div>' +
    '<label class="check-row"><input id="usActive" type="checkbox" '+(u.isActive?'checked':'')+'> Akun aktif</label>' +
    '<div class="modal-actions">' +
      (id && String(id)!==String(state.user.id) ? '<button class="btn btn-danger" onclick="deleteUser(\''+id+'\')">Hapus</button>' : '') +
      '<button class="btn btn-ghost" onclick="closeModal()">Batal</button>' +
      '<button class="btn btn-primary" onclick="saveUser(\''+esc(u.id)+'\')">Simpan</button>' +
    '</div></div>');
}
function _usZoom(){
  var u = usersCache.find(function(x){return String(x.id)===String(_lastUserId);});
  var src = (_userPhoto!==null) ? _userPhoto : (u && u.photo);
  if(src) openZoom(src); else toast('Belum ada foto.');
}
var _lastUserId = '';
function onUserPhoto(input){
  var file = input.files && input.files[0]; if(!file) return;
  loading(true);
  compressImage(file, 320, 0.8).then(function(dataUrl){
    _userPhoto = dataUrl;
    var av = $('usAvatar'); if(av){ av.innerHTML = '<img src="'+esc(dataUrl)+'" alt="foto">'; av.classList.add('clickable'); }
    var rb = $('usRemoveBtn'); if(rb) rb.style.display = '';
    loading(false);
  }).catch(function(e){ loading(false); toast(e.message); });
}
function removeUserPhoto(){
  _userPhoto = '';
  var av = $('usAvatar'); if(av){ av.innerHTML = avatarInner('', ($('usName')&&$('usName').value)||($('usUsername')&&$('usUsername').value)); av.classList.remove('clickable'); }
  var rb = $('usRemoveBtn'); if(rb) rb.style.display = 'none';
}
function saveUser(id){
  _lastUserId = id||'';
  var p = { id:id||'', username:$('usUsername').value.trim(), name:$('usName').value.trim(),
    email:$('usEmail').value.trim(), phone:$('usPhone').value.trim(), password:$('usPassword').value,
    role:$('usRole').value, isActive:$('usActive').checked };
  if(_userPhoto !== null) p.photo = _userPhoto;
  loading(true);
  api('saveUser', p)
    .then(function(){
      loading(false); closeModal(); toast('User tersimpan ✓');
      // jika mengedit diri sendiri, segarkan avatar topbar
      if(String(id)===String(state.user.id) && _userPhoto!==null){ state.user.photo=_userPhoto; refreshAvatars(); }
      loadUsers();
    })
    .catch(function(e){ loading(false); toast(e.message); });
}
function deleteUser(id){
  if(!confirm('Hapus user ini?')) return;
  loading(true);
  api('deleteUser', { id:id }).then(function(){ loading(false); closeModal(); toast('User dihapus'); loadUsers(); })
    .catch(function(e){ loading(false); toast(e.message); });
}
function openChangePassword(){
  openModal('<div class="modal narrow"><h3>Ganti Password</h3>' +
    '<div class="field"><label>Password Lama</label><input id="cpOld" type="password"></div>' +
    '<div class="field"><label>Password Baru</label><input id="cpNew" type="password" placeholder="Minimal 6 karakter"></div>' +
    '<div class="field"><label>Ulangi Password Baru</label><input id="cpNew2" type="password"></div>' +
    '<div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">Batal</button>' +
    '<button class="btn btn-primary" onclick="doChangePassword()">Simpan</button></div></div>');
}
function doChangePassword(){
  if($('cpNew').value !== $('cpNew2').value){ toast('Password baru tidak sama'); return; }
  loading(true);
  api('changePassword', { oldPassword:$('cpOld').value, newPassword:$('cpNew').value })
    .then(function(){ loading(false); closeModal(); toast('Password berhasil diganti ✓'); })
    .catch(function(e){ loading(false); toast(e.message); });
}

/* ============================================================
   INIT
============================================================ */
document.addEventListener('DOMContentLoaded', function(){
  loading(false);
  loadCachedBranding();
  $('loginPass').addEventListener('keydown', function(ev){ if(ev.key==='Enter') doLogin(); });
  // Auto-resume sesi
  var raw = null;
  try { raw = localStorage.getItem('uim_session'); } catch(e){}
  if (raw){
    try {
      var sess = JSON.parse(raw);
      if (sess && sess.token){
        state.token = sess.token; state.user = sess.user;
        enterApp(); // jika sesi kedaluwarsa, API akan memaksa logout otomatis
        return;
      }
    } catch(e){}
  }
});

/* Service worker (hanya di hosting statis / HTTPS) */
if ('serviceWorker' in navigator && location.protocol.indexOf('http') === 0 && !IS_GAS){
  window.addEventListener('load', function(){
    navigator.serviceWorker.register('sw.js').catch(function(e){ console.warn('SW gagal:', e); });
  });
}
